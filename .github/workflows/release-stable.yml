name: release-stable

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

jobs:
  build-docker-images:
    name: build-docker-images (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm/v6
            arch: armv6
          - platform: linux/arm/v7
            arch: armv7
          - platform: linux/arm64/v8
            arch: arm64v8
          - platform: linux/ppc64le
            arch: ppc64le
          - platform: linux/riscv64
            arch: riscv64
          - platform: linux/s390x
            arch: s390x
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: |
            type=image,name=ngosang/amule,push-by-digest=true,name-canonical=true,push=true
            type=image,name=ghcr.io/ngosang/amule,push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    needs: build-docker-images
    runs-on: ubuntu-24.04
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      -
        name: Create multi-arch manifest on DockerHub
        working-directory: /tmp/digests
        run: |
          TAG=${{ github.ref_name }}
          REPO=ngosang/amule
          docker buildx imagetools create \
            --tag ${REPO}:${TAG} \
            --tag ${REPO}:latest \
            $(printf "${REPO}@sha256:%s " *)
      -
        name: Create multi-arch manifest on GHCR
        working-directory: /tmp/digests
        run: |
          TAG=${{ github.ref_name }}
          REPO=ghcr.io/ngosang/amule
          docker buildx imagetools create \
            --tag ${REPO}:${TAG} \
            --tag ${REPO}:latest \
            $(printf "${REPO}@sha256:%s " *)
