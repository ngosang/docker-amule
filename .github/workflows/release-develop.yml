name: release-develop

on:
  schedule:
    # Weekly on Mondays at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  get-amule-commit:
    runs-on: ubuntu-24.04
    outputs:
      amule_commit: ${{ steps.get_commit.outputs.amule_commit }}
      amule_commit_short: ${{ steps.get_commit.outputs.amule_commit_short }}
      date_tag: ${{ steps.get_commit.outputs.date_tag }}
    steps:
      -
        name: Get latest aMule commit
        id: get_commit
        run: |
          AMULE_COMMIT=$(git ls-remote https://github.com/amule-project/amule.git refs/heads/master | cut -f1)
          AMULE_COMMIT_SHORT=${AMULE_COMMIT:0:7}
          DATE_TAG=$(date -u +%Y%m%d)
          echo "amule_commit=${AMULE_COMMIT}"
          echo "amule_commit_short=${AMULE_COMMIT_SHORT}"
          echo "date_tag=${DATE_TAG}"
          echo "amule_commit=${AMULE_COMMIT}" >> $GITHUB_OUTPUT
          echo "amule_commit_short=${AMULE_COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "date_tag=${DATE_TAG}" >> $GITHUB_OUTPUT

  build-docker-images:
    needs: get-amule-commit
    name: build-docker-images (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm/v6
            arch: armv6
          - platform: linux/arm/v7
            arch: armv7
          - platform: linux/arm64/v8
            arch: arm64v8
          - platform: linux/ppc64le
            arch: ppc64le
          - platform: linux/riscv64
            arch: riscv64
          - platform: linux/s390x
            arch: s390x
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.develop
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: |
            type=image,name=ngosang/amule,push-by-digest=true,name-canonical=true,push=true
            type=image,name=ghcr.io/ngosang/amule,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            AMULE_COMMIT=${{ needs.get-amule-commit.outputs.amule_commit }}
          labels: |
            org.opencontainers.image.version=develop-${{ needs.get-amule-commit.outputs.date_tag }}-${{ needs.get-amule-commit.outputs.amule_commit_short }}
      -
        name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      -
        name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  create-manifest:
    needs: [get-amule-commit, build-docker-images]
    runs-on: ubuntu-24.04
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}
      -
        name: Create multi-arch manifest on DockerHub
        working-directory: /tmp/digests
        run: |
          TAG=develop-${{ needs.get-amule-commit.outputs.date_tag }}-${{ needs.get-amule-commit.outputs.amule_commit_short }}
          REPO=ngosang/amule
          docker buildx imagetools create \
            --tag ${REPO}:${TAG} \
            --tag ${REPO}:develop \
            $(printf "${REPO}@sha256:%s " *)
      -
        name: Create multi-arch manifest on GHCR
        working-directory: /tmp/digests
        run: |
          TAG=develop-${{ needs.get-amule-commit.outputs.date_tag }}-${{ needs.get-amule-commit.outputs.amule_commit_short }}
          REPO=ghcr.io/ngosang/amule
          docker buildx imagetools create \
            --tag ${REPO}:${TAG} \
            --tag ${REPO}:develop \
            $(printf "${REPO}@sha256:%s " *)
