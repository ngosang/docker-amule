name: autotag

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  tag-release:
    runs-on: ubuntu-24.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Auto Tag
        uses: djordon/git-autotag-action@v0.6.0
        env:
          GITHUB_TOKEN: "${{ secrets.GH_PAT }}"
          VERSION_PREFIX: ""
          VERSION_COMMAND: cat VERSION | tr -d '[:space:]'
